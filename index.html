<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Открыть камеру</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: system-ui;
            background: #0b0b0b;
            color: white;
            flex-direction: column;
            gap: 20px;
        }
        a {
            display: inline-block;
            padding: 18px 40px;
            background: #0088cc;
            color: white;
            text-decoration: none;
            border-radius: 40px;
            font-size: 20px;
            font-weight: bold;
            transition: 0.2s;
        }
        a:active { transform: scale(0.95); }
        .note { opacity: 0.5; font-size: 14px; max-width: 300px; text-align: center; }
    </style>
</head>
<body>
    <h2>📷 Открыть камеру в:</h2>
    <a href="tg://camera">Telegram</a>
    <a href="whatsapp://camera">WhatsApp</a>
    <div class="note">⚠️ Работает только если приложение установлено</div>
</body>
</html>
