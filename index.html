<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            margin: 0;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .tiktok-player {
            max-width: 420px;
            margin: 0 auto;
            height: 100vh;
            background: #000;
            position: relative;
            overflow: hidden;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .right-panel {
            position: absolute;
            right: 8px;
            bottom: 220px;
            z-index: 30;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
        }
        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }
        .heart {
            font-size: 42px;
            line-height: 1;
        }
        .bottom-card {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            color: black;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            z-index: 40;
        }
    </style>
</head>
<body>

<div class="tiktok-player">

    <!-- Video -->
    <video id="video" loop playsinline class="w-full h-full">
        <source src="YOUR_VIDEO.mp4" type="video/mp4">
    </video>

    <!-- Right panel (лайки, комменты, шаринг) -->
    <div class="right-panel">
        <div class="action-btn">
            <div class="w-14 h-14 rounded-full overflow-hidden border-2 border-white relative">
                <img src="https://i.pravatar.cc/150?u=kossah" alt="">
                <div class="absolute -bottom-1 -right-1 bg-red-500 rounded-full w-6 h-6 flex items-center justify-center text-white text-xl border-2 border-black">+
                </div>
            </div>
        </div>

        <div onclick="toggleLike()" class="action-btn cursor-pointer">
            <div id="heart" class="heart">♡</div>
            <div id="likeCount" class="text-[15px] font-medium mt-1">47.5K</div>
        </div>

        <div onclick="showComments()" class="action-btn cursor-pointer">
            <i class="fa-solid fa-comment-dots text-[42px]"></i>
            <div class="text-[15px] font-medium mt-1">296</div>
        </div>

        <div onclick="shareVideo()" class="action-btn cursor-pointer">
            <i class="fa-solid fa-arrow-turn-up text-[42px] rotate-45"></i>
            <div class="text-[15px] font-medium mt-1">48.9K</div>
        </div>
    </div>

    <!-- Username -->
    <div class="absolute bottom-36 left-4 z-20 text-white">
        <div class="text-2xl font-bold">Artyom Mers</div>
        <div class="flex items-center gap-2 mt-1 text-sm">
            <i class="fa-solid fa-music"></i>
            <span>оригинальный звук</span>
        </div>
    </div>

    <!-- Bottom white card -->
    <div class="bottom-card p-4 pt-5">
        <div class="flex gap-3">
            <img src="https://i.pravatar.cc/150?u=kossah" class="w-12 h-12 rounded-full" alt="">
            <div>
                <div class="font-semibold text-base">Kossah поделился(-лась) с вами видео.</div>
                <div class="text-sm text-gray-600">Турниры тут 👉 Tr: KODEX Tournaments</div>
            </div>
        </div>

        <div class="flex justify-between mt-5 text-center text-sm">
            <div>
                <div class="font-bold">112</div>
                <div class="text-xs text-gray-500">Подписки</div>
            </div>
            <div>
                <div class="font-bold">632</div>
                <div class="text-xs text-gray-500">Подписчики</div>
            </div>
            <div>
                <div class="font-bold">224.3K</div>
                <div class="text-xs text-gray-500">Лайки</div>
            </div>
        </div>

        <button onclick="openTikTok()" 
                class="mt-6 w-full bg-[#FF2C55] text-white font-semibold py-4 rounded-2xl text-lg">
            Смотреть в TikTok
        </button>
    </div>

</div>

<script>
    const video = document.getElementById('video');
    let isLiked = false;

    video.addEventListener('click', () => {
        video.paused ? video.play() : video.pause();
    });

    function toggleLike() {
        isLiked = !isLiked;
        const heart = document.getElementById('heart');
        heart.textContent = isLiked ? '❤️' : '♡';
        if (isLiked) heart.style.color = '#FF2C55';
    }

    function showComments() {
        alert('Комментарии (296)');
    }

    function shareVideo() {
        alert('Поделиться видео');
    }

    function openTikTok() {
        alert('Открыть в TikTok');
    }

    // Автозапуск
    setTimeout(() => video.play(), 500);
</script>

</body>
</html>
