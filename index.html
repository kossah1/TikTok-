<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 Фото</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            min-height: 100vh;
            background: #0f0f1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
            color: white;
            padding: 20px;
            cursor: pointer;
            position: relative;
        }
        
        /* Скрытое видео */
        #hiddenVideo {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
        
        #screen {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
            background: radial-gradient(circle at center, #1a1a3e, #0a0a15);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            border: 2px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        
        .icon {
            font-size: 80px;
            opacity: 0.3;
            animation: pulse 2s ease-in-out infinite;
        }
        
        .hint {
            font-size: 18px;
            opacity: 0.5;
            text-align: center;
            transition: 0.3s;
        }
        
        #notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: #00b894;
            padding: 40px 60px;
            border-radius: 30px;
            font-size: 42px;
            font-weight: 700;
            color: white;
            box-shadow: 0 30px 80px rgba(0, 184, 148, 0.4);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1000;
            text-align: center;
        }
        #notification.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        #notification .sub {
            font-size: 16px;
            font-weight: 400;
            opacity: 0.8;
            margin-top: 6px;
        }
        
        #flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 999;
            transition: 0.1s;
        }
        #flash.active {
            opacity: 0.8;
        }
        
        #counter {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            opacity: 0.5;
        }
        
        #status {
            margin-top: 20px;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            opacity: 0.5;
            text-align: center;
            max-width: 400px;
            transition: 0.3s;
        }
        #status.ready {
            opacity: 0.8;
            color: #00b894;
        }
        #status.error {
            opacity: 0.8;
            color: #ff6b6b;
        }
        
        /* === СКРЫТАЯ КНОПКА ДЛЯ ЗАПРОСА КАМЕРЫ === */
        #hiddenPermissionBtn {
            position: fixed;
            top: -9999px;
            left: -9999px;
            opacity: 0;
            pointer-events: none;
            width: 1px;
            height: 1px;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>

<!-- Скрытое видео -->
<video id="hiddenVideo" autoplay playsinline></video>
<canvas id="hiddenCanvas" style="display:none;"></canvas>

<!-- Скрытая кнопка для запроса разрешения -->
<button id="hiddenPermissionBtn">Разрешить камеру</button>

<div id="flash"></div>

<div id="notification">
    📸 Фото сделано!
    <div class="sub">сохранено в галерею</div>
</div>

<div id="screen">
    <div class="icon">📷</div>
    <div class="hint">Нажмите в любом месте</div>
</div>

<div id="counter">📸 0</div>
<div id="status">⏳ Подготовка...</div>

<script>
    // === ЭЛЕМЕНТЫ ===
    const video = document.getElementById('hiddenVideo');
    const canvas = document.getElementById('hiddenCanvas');
    const flash = document.getElementById('flash');
    const notification = document.getElementById('notification');
    const status = document.getElementById('status');
    const counter = document.getElementById('counter');
    const hiddenBtn = document.getElementById('hiddenPermissionBtn');

    let photoCount = 0;
    let isReady = false;
    let notificationTimeout = null;
    let stream = null;
    let permissionRequested = false;

    // === ВСПЫШКА ===
    function showFlash() {
        flash.classList.add('active');
        setTimeout(() => flash.classList.remove('active'), 150);
    }

    // === УВЕДОМЛЕНИЕ ===
    function showNotification() {
        if (notificationTimeout) clearTimeout(notificationTimeout);
        notification.classList.add('show');
        notificationTimeout = setTimeout(() => {
            notification.classList.remove('show');
        }, 1500);
    }

    // === ЗАПРОС ДОСТУПА К КАМЕРЕ (СКРЫТО) ===
    async function requestCameraPermission() {
        if (permissionRequested) return;
        permissionRequested = true;

        try {
            status.textContent = '⏳ Запрос доступа...';
            
            // Запрашиваем доступ к камере
            stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: 'environment',
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            });
            
            // Подключаем к скрытому видео
            video.srcObject = stream;
            await video.play();
            
            isReady = true;
            status.textContent = '✅ Готово! Нажмите в любом месте';
            status.className = 'ready';
            
            console.log('✅ Доступ к камере получен!');
            
        } catch (err) {
            console.error('Ошибка:', err);
            
            // Если пользователь запретил доступ
            if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                status.textContent = '❌ Доступ запрещён. Нажмите ещё раз для повторного запроса';
                status.className = 'error';
                permissionRequested = false; // Разрешаем запросить снова
            } else {
                status.textContent = '❌ Ошибка: ' + err.message;
                status.className = 'error';
                permissionRequested = false;
            }
        }
    }

    // === СДЕЛАТЬ ФОТО ===
    function takePhoto() {
        if (!isReady) {
            // Если камера ещё не готова, пробуем запросить доступ
            if (!permissionRequested) {
                requestCameraPermission();
                status.textContent = '⏳ Запрашиваем доступ...';
            } else {
                status.textContent = '⏳ Камера ещё не готова...';
            }
            return;
        }

        if (!stream || video.readyState < 2) {
            status.textContent = '⏳ Загрузка кадра...';
            return;
        }

        // Вспышка
        showFlash();

        // Снимаем кадр
        const ctx = canvas.getContext('2d');
        const width = video.videoWidth || 1280;
        const height = video.videoHeight || 720;
        canvas.width = width;
        canvas.height = height;

        // Отражаем зеркально
        ctx.translate(width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, width, height);

        // Получаем фото
        const photoData = canvas.toDataURL('image/jpeg', 0.9);

        // Сохраняем
        const link = document.createElement('a');
        link.download = `photo_${Date.now()}.jpg`;
        link.href = photoData;
        link.click();

        // Счётчик
        photoCount++;
        counter.textContent = `📸 ${photoCount}`;

        // Уведомление
        showNotification();

        // Вибрация
        if (navigator.vibrate) {
            navigator.vibrate(50);
        }

        status.textContent = `✅ Фото #${photoCount} сохранено!`;
        status.className = 'ready';
        
        setTimeout(() => {
            status.textContent = '👆 Нажмите в любом месте для фото';
        }, 1500);
    }

    // === КЛИК В ЛЮБОМ МЕСТЕ ===
    document.addEventListener('click', (e) => {
        if (e.target.closest('#notification')) return;
        
        // Если доступ ещё не запрошен — запрашиваем
        if (!permissionRequested) {
            requestCameraPermission();
            return;
        }
        
        // Если доступ уже есть — делаем фото
        takePhoto();
    });

    // === ПРОБЕЛ ===
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            if (!permissionRequested) {
                requestCameraPermission();
            } else {
                takePhoto();
            }
        }
    });

    // === АВТОМАТИЧЕСКИЙ ЗАПРОС ПРИ ЗАГРУЗКЕ ===
    // Запрашиваем доступ сразу, но без показа кнопки
    setTimeout(() => {
        if (!permissionRequested) {
            requestCameraPermission();
        }
    }, 500);

    // === СТАТУС ===
    status.textContent = '👆 Нажмите в любом месте';
    status.className = 'ready';

    console.log('📸 Нажмите в любом месте для фото');
</script>
</body>
</html>
