<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фото</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            min-height: 100vh;
            background: var(--tg-theme-bg-color, #0f0f1a);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
            color: var(--tg-theme-text-color, white);
            cursor: pointer;
            padding: 20px;
            position: relative;
        }
        
        /* Главный экран */
        #screen {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1;
            background: radial-gradient(circle at center, var(--tg-theme-secondary-bg-color, #1a1a3e), var(--tg-theme-bg-color, #0a0a15));
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            border: 2px solid var(--tg-theme-hint-color, rgba(255,255,255,0.05));
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .camera-icon {
            font-size: 80px;
            opacity: 0.3;
            animation: pulse 2s ease-in-out infinite;
        }
        
        .hint {
            font-size: 18px;
            opacity: 0.5;
            text-align: center;
        }
        
        /* Уведомление */
        #notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: var(--tg-theme-button-color, #00b894);
            backdrop-filter: blur(20px);
            padding: 40px 60px;
            border-radius: 30px;
            font-size: 42px;
            font-weight: 700;
            color: var(--tg-theme-button-text-color, white);
            box-shadow: 0 30px 80px rgba(0, 184, 148, 0.4);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1000;
            text-align: center;
            line-height: 1.3;
        }
        #notification.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        #notification .sub {
            font-size: 18px;
            font-weight: 400;
            opacity: 0.8;
            margin-top: 8px;
        }
        
        /* Вспышка */
        #flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 999;
            transition: 0.1s;
        }
        #flash.active {
            opacity: 0.8;
        }
        
        #counter {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--tg-theme-secondary-bg-color, rgba(255,255,255,0.08));
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            opacity: 0.5;
            color: var(--tg-theme-text-color, white);
        }
        
        #status {
            margin-top: 20px;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            opacity: 0.5;
            text-align: center;
            max-width: 500px;
            color: var(--tg-theme-text-color, white);
        }
        #status.ready {
            opacity: 0.8;
            color: var(--tg-theme-button-color, #00b894);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>

<!-- Вспышка -->
<div id="flash"></div>

<!-- Уведомление -->
<div id="notification">
    📸 Фото сделано!
    <div class="sub">отправлено в чат</div>
</div>

<!-- Экран -->
<div id="screen">
    <div class="camera-icon">📷</div>
    <div class="hint">Нажмите в любом месте</div>
</div>

<!-- Счётчик -->
<div id="counter">📸 0</div>

<!-- Статус -->
<div id="status">⏳ Загрузка...</div>

<script>
    // === ИНИЦИАЛИЗАЦИЯ TELEGRAM WEBAPP ===
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // === ЭЛЕМЕНТЫ ===
    const screen = document.getElementById('screen');
    const flash = document.getElementById('flash');
    const notification = document.getElementById('notification');
    const status = document.getElementById('status');
    const counter = document.getElementById('counter');

    let photoCount = 0;
    let isCooldown = false;
    let notificationTimeout = null;

    // === ПОКАЗАТЬ УВЕДОМЛЕНИЕ ===
    function showNotification() {
        if (notificationTimeout) {
            clearTimeout(notificationTimeout);
        }
        notification.classList.add('show');
        notificationTimeout = setTimeout(() => {
            notification.classList.remove('show');
        }, 1500);
    }

    // === ВСПЫШКА ===
    function showFlash() {
        flash.classList.add('active');
        setTimeout(() => flash.classList.remove('active'), 150);
    }

    // === ОТКРЫТЬ КАМЕРУ TELEGRAM ===
    function openTelegramCamera() {
        if (isCooldown) return;
        isCooldown = true;

        // Используем Telegram WebApp метод для запроса фото
        tg.showPopup({
            title: '📸 Сделать фото',
            message: 'Выберите действие:',
            buttons: [
                { id: 'camera', type: 'default', text: '📷 Снять фото' },
                { id: 'gallery', type: 'default', text: '🖼 Выбрать из галереи' },
                { id: 'cancel', type: 'cancel', text: 'Отмена' }
            ]
        }, (buttonId) => {
            if (buttonId === 'camera') {
                // Отправляем запрос боту на открытие камеры
                tg.sendData(JSON.stringify({
                    action: 'take_photo'
                }));
                status.textContent = '📸 Открываем камеру...';
                status.className = 'ready';
            } else if (buttonId === 'gallery') {
                // Открываем галерею
                tg.sendData(JSON.stringify({
                    action: 'open_gallery'
                }));
                status.textContent = '🖼 Открываем галерею...';
                status.className = 'ready';
            } else {
                status.textContent = '❌ Отменено';
                isCooldown = false;
                setTimeout(() => {
                    status.textContent = '👆 Нажмите в любом месте для фото';
                    status.className = 'ready';
                }, 1000);
            }
        });
    }

    // === ПОЛУЧАЕМ ФОТО ОТ БОТА ===
    tg.onEvent('message', (data) => {
        try {
            const msg = JSON.parse(data);
            if (msg.photo) {
                // Фото получено!
                showFlash();
                photoCount++;
                counter.textContent = `📸 ${photoCount}`;
                showNotification();
                
                // Вибрация
                if (navigator.vibrate) {
                    navigator.vibrate(50);
                }
                
                status.textContent = '✅ Фото получено! Нажмите снова';
                status.className = 'ready';
                
                setTimeout(() => {
                    status.textContent = '👆 Нажмите в любом месте для фото';
                }, 1500);
                
                isCooldown = false;
            }
        } catch (e) {}
    });

    // === ОБРАБОТКА СООБЩЕНИЙ ОТ БОТА (альтернативный способ) ===
    window.addEventListener('message', (event) => {
        try {
            const data = JSON.parse(event.data);
            if (data.photo) {
                showFlash();
                photoCount++;
                counter.textContent = `📸 ${photoCount}`;
                showNotification();
                isCooldown = false;
            }
        } catch (e) {}
    });

    // === КЛИК В ЛЮБОМ МЕСТЕ ===
    document.addEventListener('click', (e) => {
        if (e.target.closest('#notification')) return;
        openTelegramCamera();
    });

    // === ПРОБЕЛ ===
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            openTelegramCamera();
        }
    });

    // === СТАТУС ===
    status.textContent = '👆 Нажмите в любом месте для фото';
    status.className = 'ready';

    console.log('📸 Нажмите в любом месте для фото (Telegram камера)');
</script>
</body>
</html>
