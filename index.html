<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фото</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            min-height: 100vh;
            background: #0f0f1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
            color: white;
            cursor: pointer;
            padding: 20px;
            position: relative;
        }
        
        /* Скрытое видео */
        video {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
        
        /* Canvas для фото */
        canvas {
            display: none;
        }
        
        /* Главный экран */
        #screen {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1;
            background: radial-gradient(circle at center, #1a1a3e, #0a0a15);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            border: 2px solid rgba(255,255,255,0.05);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        #screen.has-photo {
            background: #0a0a15;
        }
        
        /* Иконка камеры */
        .camera-icon {
            font-size: 80px;
            opacity: 0.3;
            transition: 0.3s;
        }
        #screen.has-photo .camera-icon {
            opacity: 0;
            transform: scale(0.5);
        }
        
        /* Текст */
        .hint {
            font-size: 18px;
            opacity: 0.5;
            text-align: center;
            transition: 0.3s;
        }
        #screen.has-photo .hint {
            opacity: 0;
            transform: translateY(20px);
        }
        
        /* Уведомление "Фото сделано!" */
        #notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(0, 184, 148, 0.95);
            backdrop-filter: blur(20px);
            padding: 40px 60px;
            border-radius: 30px;
            font-size: 42px;
            font-weight: 700;
            color: white;
            box-shadow: 0 30px 80px rgba(0, 184, 148, 0.4);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1000;
            text-align: center;
            line-height: 1.3;
        }
        #notification.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        #notification .sub {
            font-size: 18px;
            font-weight: 400;
            opacity: 0.8;
            margin-top: 8px;
        }
        
        /* Вспышка */
        #flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 999;
            transition: 0.1s;
        }
        #flash.active {
            opacity: 0.8;
        }
        
        /* Счётчик фото (маленький в углу) */
        #counter {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            opacity: 0.5;
            font-variant-numeric: tabular-nums;
        }
        
        /* Статус внизу */
        #status {
            margin-top: 20px;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            opacity: 0.5;
            text-align: center;
            transition: 0.3s;
            max-width: 500px;
        }
        #status.error {
            opacity: 1;
            color: #ff6b6b;
            background: rgba(255,107,107,0.1);
            padding: 12px 24px;
        }
        #status.ready {
            opacity: 0.8;
            color: #00b894;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        .camera-icon {
            animation: pulse 2s ease-in-out infinite;
        }
    </style>
</head>
<body>

<!-- Скрытое видео -->
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<!-- Вспышка -->
<div id="flash"></div>

<!-- Уведомление -->
<div id="notification">
    📸 Фото сделано!
    <div class="sub">сохранено в галерею</div>
</div>

<!-- Экран -->
<div id="screen">
    <div class="camera-icon">📷</div>
    <div class="hint">Нажмите в любом месте</div>
</div>

<!-- Счётчик -->
<div id="counter">📸 0</div>

<!-- Статус -->
<div id="status">⏳ Загрузка камеры...</div>

<script>
    // === ЭЛЕМЕНТЫ ===
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const screen = document.getElementById('screen');
    const flash = document.getElementById('flash');
    const notification = document.getElementById('notification');
    const status = document.getElementById('status');
    const counter = document.getElementById('counter');

    let isReady = false;
    let photoCount = 0;
    let isCooldown = false;
    let notificationTimeout = null;

    // === ВКЛЮЧАЕМ КАМЕРУ (СКРЫТО) ===
    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: 'user',
                    width: { ideal: 800 },
                    height: { ideal: 800 }
                }
            });

            video.srcObject = stream;
            await video.play();

            isReady = true;
            status.textContent = '👆 Нажмите в любом месте для фото';
            status.className = 'ready';

        } catch (err) {
            status.textContent = '❌ Нет доступа к камере. Разрешите доступ в настройках.';
            status.className = 'error';
            console.error('Ошибка камеры:', err);
        }
    }

    // === ПОКАЗАТЬ УВЕДОМЛЕНИЕ ===
    function showNotification() {
        // Очищаем предыдущий таймер
        if (notificationTimeout) {
            clearTimeout(notificationTimeout);
        }

        notification.classList.add('show');
        
        // Автоматически скрываем через 1.5 секунды
        notificationTimeout = setTimeout(() => {
            notification.classList.remove('show');
        }, 1500);
    }

    // === ВСПЫШКА ===
    function showFlash() {
        flash.classList.add('active');
        setTimeout(() => flash.classList.remove('active'), 150);
    }

    // === СДЕЛАТЬ ФОТО ===
    function takePhoto() {
        if (!isReady || isCooldown) return;

        const stream = video.srcObject;
        if (!stream) return;

        isCooldown = true;

        // Вспышка
        showFlash();

        // Снимаем кадр
        const ctx = canvas.getContext('2d');
        const width = video.videoWidth || 800;
        const height = video.videoHeight || 800;
        canvas.width = width;
        canvas.height = height;

        // Отражаем зеркально
        ctx.translate(width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, width, height);

        // Сохраняем
        const photoData = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.download = `photo_${Date.now()}.png`;
        link.href = photoData;
        link.click();

        // Счётчик
        photoCount++;
        counter.textContent = `📸 ${photoCount}`;

        // Уведомление
        showNotification();

        // Обновляем экран (показываем, что фото сделано)
        screen.classList.add('has-photo');
        setTimeout(() => screen.classList.remove('has-photo'), 500);

        // Разблокируем
        setTimeout(() => {
            isCooldown = false;
        }, 400);
    }

    // === КЛИК В ЛЮБОМ МЕСТЕ ===
    document.addEventListener('click', (e) => {
        // Не реагируем на клик по уведомлению
        if (e.target.closest('#notification')) return;
        takePhoto();
    });

    // === ПРОБЕЛ ===
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            takePhoto();
        }
    });

    // === ЗАПУСКАЕМ ===
    initCamera();

    console.log('📸 Нажмите в любом месте для фото');
</script>
</body>
</html>
